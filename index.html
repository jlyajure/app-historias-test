<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratorio Familia</title>
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        :root { --accent-blue: #3b82f6; --dark-bg: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); --wa-green: #25d366; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; background: var(--dark-bg); background-attachment: fixed; color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&q=80&w=2070') no-repeat center center/cover; display: flex; align-items: flex-start; justify-content: center; z-index: 1000; padding-top: 100px; }
        #login-screen::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
        .login-card { position: relative; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); padding: 40px 25px; border-radius: 35px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        #passInput { width: 100%; padding: 18px; border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; background: rgba(255,255,255,0.08); color: white; text-align: center; outline: none; margin-top: 20px; font-size: 16px; }
        #btnEntrar { width: 100%; padding: 16px; background: var(--wa-green); color: white; border: none; border-radius: 20px; margin-top: 15px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(37,211,102,0.3); transition: 0.2s; }
        
        #app-content { display: none; padding-bottom: 40px; }
        header { background: rgba(15, 23, 42, 0.9); padding: 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .container { max-width: 480px; margin: auto; padding: 20px 15px; }

        .filter-scroll { overflow-x: auto; white-space: nowrap; padding-bottom: 10px; margin-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 20px; margin-right: 8px; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .filter-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); font-weight: 800; }

        .category-select { width: 100%; padding: 14px 20px; margin-bottom: 10px; border-radius: 18px; background-color: #f8fafc; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23334155' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 16px center; background-size: 16px; border: 2px solid #cbd5e1; font-size: 14px; color: #0f172a; font-weight: 800; -webkit-appearance: none; appearance: none; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); outline: none; }
        .month-separator { background: rgba(59, 130, 246, 0.2); color: #93c5fd; padding: 8px 20px; border-radius: 50px; font-size: 12px; font-weight: 800; text-align: center; margin: 30px 0 15px 0; border: 1px solid rgba(59, 130, 246, 0.3); letter-spacing: 2px; text-transform: uppercase; }
        
        .btn-post { color: white; padding: 16px; border-radius: 18px; font-weight: 700; cursor: pointer; display: block; text-align: center; margin-bottom: 10px; transition: transform 0.2s; border:none; width:100%; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-post:active { transform: scale(0.95); }
        
        #create-post-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 25px; }
        #status-msg { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 15px; min-height: 15px; font-weight: bold; }

        .post { background: #e2e8f0; border-radius: 28px; padding: 20px; margin-bottom: 25px; color: #0f172a; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 2px solid #cbd5e1; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .post-author { font-weight: 800; color: #1d4ed8; font-size: 14px; }
        .category-badge { font-size: 10px; background: #dbeafe; color: #1e40af; padding: 4px 8px; border-radius: 8px; font-weight: 800; margin-left: 8px; text-transform: uppercase; border: 1px solid #bfdbfe; }
        .post-date { font-size: 11px; color: #475569; font-weight: 700; } 
        .btn-delete-admin { background: #ff4757; color: white; border: none; padding: 6px 10px; border-radius: 10px; cursor: pointer; margin-left: 10px; }
        
        .post-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 10px; margin: 10px 0; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .post-carousel::-webkit-scrollbar { height: 6px; }
        .post-carousel::-webkit-scrollbar-track { background: #cbd5e1; border-radius: 10px; }
        .post-carousel::-webkit-scrollbar-thumb { background: #64748b; border-radius: 10px; }
        .post-carousel img { scroll-snap-align: center; flex: 0 0 100%; width: 100%; border-radius: 20px; object-fit: cover; cursor: pointer; border: 1px solid #cbd5e1; }
        
        /* 🔥 ZONA DE REACCIONES NUEVA 🔥 */
        .reaction-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; position: relative; }
        
        /* Botón principal de Reacción */
        .btn-reaction-trigger { background: #ffffff; color: #334155; border: 1px solid #cbd5e1; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-reaction-trigger:active { transform: scale(0.95); }
        
        /* Panel Desplegable de Emojis */
        .reaction-dock { 
            display: none; 
            position: absolute; 
            bottom: 45px; 
            left: 0; 
            background: white; 
            padding: 8px; 
            border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            gap: 10px; 
            z-index: 100; 
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #e2e8f0;
        }
        @keyframes popUp { from { transform: scale(0.5) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        
        .reaction-option { font-size: 24px; cursor: pointer; transition: transform 0.2s; user-select: none; }
        .reaction-option:hover { transform: scale(1.3); }
        .reaction-option:active { transform: scale(0.9); }

        /* Lista de reacciones debajo */
        .reactions-display { font-size: 11px; color: #475569; font-weight: 700; font-style: italic; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
        .mini-reaction-icon { font-size: 14px; margin-right: 2px; }

        .comments-section { background: #ffffff; padding: 12px; border-radius: 18px; border: 1px solid #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .comment { font-size: 13px; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 6px; color: #1e293b; }
        .comment b { color: #0f172a; font-weight: 800; }
        .comment-input-group { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; border: 1px solid #cbd5e1; border-radius: 10px; padding: 8px; font-size: 13px; outline: none; background: #f8fafc; color: #0f172a; font-weight: 600; }
        .btn-send-comment { background: var(--accent-blue); color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        #photo-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; overflow: auto; justify-content: center; align-items: center; touch-action: none; }
        #modal-img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-out; transition: transform 0.2s; }
        #close-modal-btn { position: fixed; top: 20px; right: 20px; z-index: 5001; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s; }
        #close-modal-btn svg { width: 22px; height: 22px; stroke: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div style="font-size: 45px; margin-bottom: 15px;">🧪</div>
        <h2 style="color: white; margin: 0;">Laboratorio Reacciones</h2>
        <input type="password" id="passInput" placeholder="Clave de acceso">
        <button id="btnEntrar">ENTRAR AL LAB</button>
    </div>
</div>

<div id="app-content">
    <header>
        <h1 style="font-size: 18px; margin:0; color:white;">Familia (LAB)</h1>
        <button onclick="localStorage.removeItem('familia_auth_lab'); location.reload();" style="background:rgba(255,255,255,0.1); color:#94a3b8; border:none; padding:10px; border-radius:10px; cursor:pointer;">Salir 🔒</button>
    </header>
    <div class="container">
        
        <div class="filter-scroll">
            <button class="filter-btn active" onclick="filtrar('Todo')">Todo</button>
            <button class="filter-btn" onclick="filtrar('Familia')">🏠 Familia</button>
            <button class="filter-btn" onclick="filtrar('Fiestas')">🎉 Fiestas</button>
            <button class="filter-btn" onclick="filtrar('Jodedera')">🤣 Jodedera</button>
        </div>

        <div id="create-post-box">
            <h3 style="margin-top:0; font-size:14px; color:#e2e8f0; text-align:center;">NUEVA PUBLICACIÓN</h3>
            <select id="categoriaInput" class="category-select">
                <option value="Familia">🏠 Categoria (Familia)</option>
                <option value="Fiestas">🎉 Categoria (Fiestas)</option>
                <option value="Jodedera">🤣 Categoria (Jodedera)</option>
            </select>
            <div style="display:flex; gap:10px;">
                <label for="fotoInput" id="labelFoto" class="btn-post" style="background:#64748b; font-size:13px; margin-bottom:0; flex:1;">📸 FOTOS</label>
                <input type="file" id="fotoInput" style="display:none;" accept="image/*" multiple>
                <button id="btnGrabar" class="btn-post" style="background:#ef4444; font-size:13px; margin-bottom:0; flex:1;">🎙️ AUDIO</button>
            </div>
            
            <div id="recording-status" style="display:none; color: #ef4444; text-align: center; font-weight: 800; margin: 15px 0;">
                🔴 Grabando... (<span id="relojAudio">0</span>s) 
                <button id="btnStop" style="margin-left:10px; background:#0f172a; color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:bold;">Parar ⏹️</button>
            </div>
            <audio id="audioPreview" controls style="display:none; width: 100%; margin-top: 15px; border-radius: 10px;"></audio>
            <button id="btnBorrarAudio" class="btn-post" style="display:none; background:#64748b; font-size:13px; margin-top:5px; padding:10px;">🗑️ DESCARTAR AUDIO</button>
            <button id="btnPublicarTodo" class="btn-post" style="background: var(--wa-green); margin-top: 15px; font-size:16px;">🚀 PUBLICAR</button>
            <div id="status-msg" style="margin-top:10px; margin-bottom:0;"></div>
        </div>

        <div id="muro"></div>
    </div>
</div>

<div id="photo-modal">
    <div id="close-modal-btn" onclick="cerrarLupa()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </div>
    <img id="modal-img" src="">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBwBq4gLgv4DSfUidzUuC7Irmvj_4pCTtI", authDomain: "familia-yajure-app.firebaseapp.com", projectId: "familia-yajure-app", storageBucket: "familia-yajure-app.firebasestorage.app", messagingSenderId: "692035727386", appId: "1:692035727386:web:dfa3e39a481d56368a61a3" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CLAVE_NORMAL = "familia2026"; const CLAVE_ADMIN = "ticoadmin2026";
    const IMGBB_KEY = "07dd4f0a1180673510c5047ae8b5eec8"; 

    let todosLosPosts = [];
    let filtroActual = 'Todo';

    let archivosSeleccionados = [];
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob = null;
    let recordTimer;
    let secInterval;

    const getNombre = () => { let n = localStorage.getItem('user_n_lab'); if(!n) { n = prompt("👤 Nombre para el Laboratorio:"); if(n) localStorage.setItem('user_n_lab', n); } return n; };

    if(localStorage.getItem('familia_auth_lab')) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; getNombre(); }

    document.getElementById('btnEntrar').onclick = () => { const val = document.getElementById('passInput').value.trim().toLowerCase(); if(val === CLAVE_NORMAL || val === CLAVE_ADMIN) { localStorage.setItem('familia_auth_lab', val); document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; getNombre(); } else { alert("Clave incorrecta"); } };

    window.abrirLupa = (url) => { document.getElementById('modal-img').src = url; document.getElementById('photo-modal').style.display = 'flex'; };
    window.cerrarLupa = () => { document.getElementById('photo-modal').style.display = 'none'; };

    // 📸 SELECCIONAR FOTOS
    document.getElementById('fotoInput').onchange = (e) => {
        archivosSeleccionados = e.target.files;
        if(archivosSeleccionados.length > 5) { alert("Máximo 5 fotos."); archivosSeleccionados = []; return; }
        if(archivosSeleccionados.length > 0) { document.getElementById('labelFoto').innerHTML = `✅ ${archivosSeleccionados.length} FOTO(S)`; document.getElementById('labelFoto').style.background = "#25d366"; }
    };

    // 🎙️ GRABAR AUDIO
    document.getElementById('btnGrabar').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream); mediaRecorder.start(); audioChunks = [];
            let segundos = 0; document.getElementById('relojAudio').innerText = "0";
            secInterval = setInterval(() => { segundos++; document.getElementById('relojAudio').innerText = segundos; }, 1000);
            recordTimer = setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 30000);
            mediaRecorder.addEventListener("dataavailable", event => { audioChunks.push(event.data); });
            mediaRecorder.addEventListener("stop", () => {
                clearTimeout(recordTimer); clearInterval(secInterval);
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                document.getElementById('audioPreview').src = audioUrl; document.getElementById('audioPreview').style.display = 'block';
                document.getElementById('recording-status').style.display = 'none';
                document.getElementById('btnGrabar').innerText = "✅ AUDIO LISTO"; document.getElementById('btnGrabar').style.background = "#25d366"; document.getElementById('btnGrabar').style.display = 'block';
                document.getElementById('btnBorrarAudio').style.display = 'block';
            });
            document.getElementById('recording-status').style.display = 'block'; document.getElementById('btnGrabar').style.display = 'none'; document.getElementById('audioPreview').style.display = 'none'; document.getElementById('btnBorrarAudio').style.display = 'none';
        } catch (err) { alert("⚠️ Dale permiso al micrófono."); }
    };
    document.getElementById('btnStop').onclick = () => { if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); };
    document.getElementById('btnBorrarAudio').onclick = () => { audioBlob = null; audioChunks = []; document.getElementById('audioPreview').src = ""; document.getElementById('audioPreview').style.display = 'none'; document.getElementById('btnBorrarAudio').style.display = 'none'; document.getElementById('btnGrabar').innerText = "🎙️ AUDIO"; document.getElementById('btnGrabar').style.background = "#ef4444"; };

    // 🚀 PUBLICAR
    document.getElementById('btnPublicarTodo').onclick = async () => {
        const nombre = getNombre(); if (!nombre) return;
        if(archivosSeleccionados.length === 0 && !audioBlob) { alert("⚠️ Agrega al menos una foto o graba un audio."); return; }
        const cat = document.getElementById('categoriaInput').value; const mensaje = prompt(`✍️ Mensaje (Opcional):`); const status = document.getElementById('status-msg');
        status.innerHTML = "⏳ Subiendo..."; document.getElementById('btnPublicarTodo').style.display = 'none';
        try {
            let urlsSubidas = [];
            if(archivosSeleccionados.length > 0) {
                status.innerHTML = "🎨 Subiendo fotos...";
                for(let i = 0; i < archivosSeleccionados.length; i++) {
                    const formData = new FormData(); formData.append("image", archivosSeleccionados[i]); 
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
                    const imgData = await res.json(); if (imgData.success) urlsSubidas.push(imgData.data.url);
                }
            }
            let base64Audio = null;
            if(audioBlob) { status.innerHTML = "🎙️ Subiendo audio..."; base64Audio = await new Promise((r) => { const reader = new FileReader(); reader.readAsDataURL(audioBlob); reader.onloadend = () => r(reader.result); }); }
            status.innerHTML = "📝 Guardando...";
            await addDoc(collection(db, "mensajes"), { texto: mensaje || "", fotos: urlsSubidas, audio: base64Audio, autor: nombre, categoria: cat, fecha: new Date(), reacciones: {}, comentarios: [] }); // ⚠️ OJO: Nuevo campo 'reacciones'
            status.innerHTML = "✅ ¡Listo!";
            archivosSeleccionados = []; audioBlob = null; document.getElementById('fotoInput').value = ""; document.getElementById('labelFoto').innerHTML = "📸 FOTOS"; document.getElementById('labelFoto').style.background = "#64748b"; document.getElementById('btnGrabar').innerText = "🎙️ AUDIO"; document.getElementById('btnGrabar').style.background = "#ef4444"; document.getElementById('audioPreview').style.display = 'none'; document.getElementById('audioPreview').src = ""; document.getElementById('btnBorrarAudio').style.display = 'none'; document.getElementById('btnPublicarTodo').style.display = 'block';
        } catch (err) { status.innerHTML = "❌ Error."; alert("Error: " + err.message); document.getElementById('btnPublicarTodo').style.display = 'block'; }
    };

    // ==========================================
    // PINTAR MURO
    // ==========================================
    const q = query(collection(db, "mensajes"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        todosLosPosts = [];
        snapshot.forEach((doc) => { todosLosPosts.push({ id: doc.id, ...doc.data() }); });
        pintarMuro();
    });

    window.filtrar = (cat) => { filtroActual = cat; document.querySelectorAll('.filter-btn').forEach(btn => { btn.classList.remove('active'); if(btn.innerText.includes(cat) || (cat === 'Todo' && btn.innerText === 'Todo')) btn.classList.add('active'); }); pintarMuro(); };

    function pintarMuro() {
        const muro = document.getElementById('muro'); muro.innerHTML = "";
        const esAdmin = localStorage.getItem('familia_auth_lab') === "ticoadmin2026";
        const miNombre = localStorage.getItem('user_n_lab'); 
        let ultimoMes = "";
        const postsAmostrar = todosLosPosts.filter(p => filtroActual === 'Todo' || p.categoria === filtroActual);

        if(postsAmostrar.length === 0) { muro.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8;">No hay publicaciones en el laboratorio...</div>`; return; }

        postsAmostrar.forEach((data) => {
            const fechaObj = data.fecha ? (typeof data.fecha.toDate === 'function' ? data.fecha.toDate() : new Date(data.fecha)) : new Date();
            const mesActual = fechaObj.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            const fechaCorta = fechaObj.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
            const catLabel = data.categoria || "Familia"; 

            if (mesActual !== ultimoMes) { muro.innerHTML += `<div class="month-separator">${mesActual}</div>`; ultimoMes = mesActual; }

            let imagenesArray = data.fotos || []; let carouselHtml = imagenesArray.length > 0 ? `<div class="post-carousel">` + imagenesArray.map(url => `<img src="${url}" onclick="window.abrirLupa('${url}')">`).join('') + `</div>` : "";
            let audioHtml = data.audio ? `<audio controls src="${data.audio}" style="width:100%; margin-top:10px; margin-bottom: 10px; border-radius: 10px;"></audio>` : "";
            let comentariosHtml = data.comentarios ? data.comentarios.map(c => `<div class="comment"><b>${c.autor}:</b> ${c.texto}</div>`).join('') : "";

            // 🔥 LOGICA DE REACCIONES 🔥
            let reacciones = data.reacciones || {}; // Objeto { "Pepe": "❤️", "Tico": "😂" }
            
            // Si el post es viejo y tiene 'likesBy', lo convertimos visualmente a '👍'
            if(Object.keys(reacciones).length === 0 && data.likesBy && data.likesBy.length > 0) {
                data.likesBy.forEach(u => reacciones[u] = "👍");
            }

            let miReaccion = reacciones[miNombre];
            let botonReaccionLabel = miReaccion ? `${miReaccion} TÚ` : `😊 Reaccionar`;
            let estiloBoton = miReaccion ? "background:#e0f2fe; color:#0284c7; border-color:#0284c7;" : "";

            // Contar reacciones
            let conteo = {};
            Object.values(reacciones).forEach(r => { conteo[r] = (conteo[r] || 0) + 1; });
            let textoReacciones = "";
            let totalReacciones = 0;
            for (const [emoji, num] of Object.entries(conteo)) { textoReacciones += `<span class="mini-reaction-icon">${emoji}</span> `; totalReacciones += num; }
            if (totalReacciones > 0) textoReacciones += ` (${totalReacciones})`;
            
            // Nombres de quienes reaccionaron
            let nombres = Object.keys(reacciones).slice(0, 3).join(", ");
            if(Object.keys(reacciones).length > 3) nombres += ` y ${Object.keys(reacciones).length - 3} más`;
            if(totalReacciones > 0 && nombres) textoReacciones += ` · ${nombres}`;

            muro.innerHTML += `
                <div class="post">
                    <div class="post-header">
                        <span class="post-author">👤 ${data.autor} <span class="category-badge">${catLabel}</span></span>
                        <div>
                            <span class="post-date">${fechaCorta}</span>
                            ${esAdmin ? `<button class="btn-delete-admin" onclick="window.borrarPost('${data.id}')">🗑️</button>` : ""}
                        </div>
                    </div>
                    <p style="font-weight: 600;">${data.texto}</p>
                    ${audioHtml} 
                    ${carouselHtml} 

                    <div class="reaction-wrapper">
                        <button class="btn-reaction-trigger" onclick="toggleDock('${data.id}')" style="${estiloBoton}">
                            ${botonReaccionLabel}
                        </button>
                        <div id="dock-${data.id}" class="reaction-dock">
                            <span class="reaction-option" onclick="enviarReaccion('${data.id}', '👍')">👍</span>
                            <span class="reaction-option" onclick="enviarReaccion('${data.id}', '❤️')">❤️</span>
                            <span class="reaction-option" onclick="enviarReaccion('${data.id}', '😂')">😂</span>
                            <span class="reaction-option" onclick="enviarReaccion('${data.id}', '😮')">😮</span>
                            <span class="reaction-option" onclick="enviarReaccion('${data.id}', '😢')">😢</span>
                            <span class="reaction-option" onclick="enviarReaccion('${data.id}', '🍻')">🍻</span>
                        </div>
                    </div>
                    
                    <div class="reactions-display">${textoReacciones}</div>
                    
                    <div class="comments-section" style="margin-top:10px;">${comentariosHtml}
                        <div class="comment-input-group">
                            <input type="text" id="input-${data.id}" class="comment-input" placeholder="Opinar...">
                            <button class="btn-send-comment" onclick="enviarComentario('${data.id}')">Publicar</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    window.toggleDock = (id) => {
        let dock = document.getElementById(`dock-${id}`);
        let display = dock.style.display;
        // Cierra todos los otros docks primero
        document.querySelectorAll('.reaction-dock').forEach(d => d.style.display = 'none');
        dock.style.display = (display === 'flex') ? 'none' : 'flex';
    };

    window.enviarReaccion = async (id, emoji) => {
        const nombre = getNombre(); if(!nombre) return;
        document.getElementById(`dock-${id}`).style.display = 'none'; // Cerrar dock
        
        const docRef = doc(db, "mensajes", id); 
        const docSnap = await getDoc(docRef);
        
        if (docSnap.exists()) { 
            const data = docSnap.data();
            let reacciones = data.reacciones || {}; 
            
            // Si ya tenía esa misma reacción, la quitamos (toggle off)
            if (reacciones[nombre] === emoji) {
                delete reacciones[nombre];
            } else {
                // Si no, la ponemos o actualizamos
                reacciones[nombre] = emoji;
            }
            
            await updateDoc(docRef, { reacciones: reacciones });
        }
    };

    window.enviarComentario = async (id) => { const input = document.getElementById(`input-${id}`); const nombre = getNombre(); if (!input.value || !nombre) return; await updateDoc(doc(db, "mensajes", id), { comentarios: arrayUnion({ autor: nombre, texto: input.value }) }); input.value = ""; };
    window.borrarPost = async (id) => { if(confirm("¿Borrar este recuerdo?")) await deleteDoc(doc(db, "mensajes", id)); };
</script>

</body>
</html>
